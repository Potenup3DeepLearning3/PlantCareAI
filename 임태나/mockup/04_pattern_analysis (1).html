<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Noto Sans KR',system-ui,sans-serif}
.phone{width:360px;background:#2C2C2A;border-radius:40px;padding:12px;box-shadow:0 12px 48px rgba(0,0,0,0.4)}
.inner{background:#F7F5F0;border-radius:30px;overflow:hidden;min-height:700px;position:relative;padding-bottom:60px}
.notch{width:110px;height:8px;background:#2C2C2A;border-radius:4px;margin:10px auto 16px}
.p{padding:18px 22px}
.section{font-size:18px;font-weight:700;color:#2C2C2A;margin:8px 0 10px}
.avatar{width:38px;height:38px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.bubble{background:#fff;border:0.5px solid #E5E0D5;border-radius:14px 14px 14px 4px;padding:11px 15px;font-size:13.5px;color:#2C2C2A;flex:1;margin-left:10px;line-height:1.6}
.bname{font-size:10px;color:#3B6D11;font-weight:600;margin-bottom:3px}
.chat{display:flex;align-items:flex-start;margin:12px 0}
.report{background:linear-gradient(135deg,#EAF3DE,#FFF9E6);border-radius:20px;padding:20px;margin:12px 0;text-align:center}
.report-title{font-size:14px;font-weight:600;color:#3B6D11;margin-bottom:12px}
.report-stats{display:flex;justify-content:space-around;margin:8px 0}
.rstat-num{font-size:26px;font-weight:700;color:#2C2C2A}
.rstat-label{font-size:10px;color:#888780;margin-top:2px}
.card-white{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,0.04);margin:10px 0}
.card-title{font-size:14px;font-weight:600;color:#2C2C2A;margin-bottom:8px}
.good-item{font-size:13px;color:#3B6D11;margin:6px 0;line-height:1.5}
.tip-item{font-size:13px;color:#888780;margin:6px 0;line-height:1.5}
.bnav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #E5E0D5;display:flex;justify-content:space-around;padding:12px 0 10px;font-size:10px}
.ni{text-align:center;color:#B4B2A9}.na{text-align:center;color:#3B6D11;font-weight:600}
</style></head><body>
<div class="phone"><div class="inner">
<div class="notch"></div>
<div class="p">
<div class="section">마리가 본 너의 돌봄</div>
<div class="report">
<div class="report-title">돌봄 리포트</div>
<div class="report-stats">
<div><div class="rstat-num">30</div><div class="rstat-label">총 기록</div></div>
<div><div class="rstat-num">7</div><div class="rstat-label">연속 돌봄</div></div>
<div><div class="rstat-num" style="color:#3B6D11">-13%</div><div class="rstat-label">병변 감소</div></div>
</div>
</div>
<div class="chat"><div class="avatar">😊</div><div class="bubble"><div class="bname">분즈</div>마리가 그러는데, 너가 3~4일마다 물 주는 거 딱 좋대. 그리고 약 준 다음에 확실히 나아졌어</div></div>
<div class="card-white">
<div class="card-title">잘하고 있는 것 👏</div>
<div class="good-item">✦ 물 주기 간격이 규칙적이야</div>
<div class="good-item">✦ 아프면 바로 약 줬어. 빠른 대응 좋아</div>
<div class="good-item">✦ 꾸준히 들여다봐주는 거 대단해</div>
</div>
<div class="card-white">
<div class="card-title">한 가지 힌트 💡</div>
<div class="tip-item">✦ 잎 닦기를 좀 더 자주 하면 좋겠대. 먼지가 쌓이면 호흡이 힘들거든</div>
</div>
<div class="chat"><div class="avatar">😊</div><div class="bubble"><div class="bname">분즈</div>솔직히 너 꽤 잘 키우는 듯. 이런 시간이 너한테도 의미 있을 거야</div></div>
</div>
<div class="bnav"><div class="ni">🏠 홈</div><div class="ni">📷 진단</div><div class="ni">🎙️ 상담</div><div class="na">📊 이력</div></div>
</div></div>
</body></html>
