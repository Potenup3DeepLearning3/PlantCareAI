<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Noto Sans KR',system-ui,sans-serif}
.phone{width:360px;background:#2C2C2A;border-radius:40px;padding:12px;box-shadow:0 12px 48px rgba(0,0,0,0.4)}
.inner{background:#F7F5F0;border-radius:30px;overflow:hidden;min-height:700px;position:relative;padding-bottom:60px}
.notch{width:110px;height:8px;background:#2C2C2A;border-radius:4px;margin:10px auto 16px}
.p{padding:18px 22px}
.section{font-size:18px;font-weight:700;color:#2C2C2A;margin:8px 0 14px;text-align:center}
.avatar{width:28px;height:28px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.bubble-sm{background:#fff;border:0.5px solid #E5E0D5;border-radius:10px 10px 10px 4px;padding:7px 10px;font-size:11px;color:#2C2C2A;flex:1;margin-left:6px;line-height:1.5}
.bname-sm{font-size:8px;color:#3B6D11;font-weight:600;margin-bottom:2px}
.chat-sm{display:flex;align-items:flex-start;margin:8px 0 0}
.card-day1{background:#fff;border:1px solid #E5E0D5;border-radius:20px;padding:18px;margin:10px 0}
.card-day30{background:#FFF9E6;border:1.5px solid #C0DD97;border-radius:20px;padding:18px;margin:10px 0}
.day-label{font-size:11px;color:#888780;margin-bottom:6px}
.day-label-green{font-size:11px;color:#3B6D11;margin-bottom:6px}
.day-row{display:flex;justify-content:space-between;align-items:center}
.day-stage{font-size:16px;font-weight:700;color:#2C2C2A}
.day-meta{font-size:10px;color:#888780;margin-top:2px}
.day-meta-green{font-size:10px;color:#3B6D11;margin-top:2px}
.day-emoji{font-size:28px}
.day-badge{font-size:10px;color:#B4B2A9}
.arrow-down{text-align:center;font-size:16px;color:#E5E0D5;margin:8px 0;letter-spacing:2px}
.arrow-label{text-align:center;font-size:12px;color:#3B6D11;font-weight:500;margin:2px 0 8px}
.closing{background:linear-gradient(135deg,#EAF3DE,#FFF9E6);border-radius:16px;padding:18px 20px;margin:16px 0;text-align:center}
.closing-main{font-size:15px;font-weight:700;color:#3B6D11;line-height:1.5}
.closing-sub{font-size:12px;color:#888780;margin-top:8px;line-height:1.6}
.bnav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #E5E0D5;display:flex;justify-content:space-around;padding:12px 0 10px;font-size:10px}
.ni{text-align:center;color:#B4B2A9}.na{text-align:center;color:#3B6D11;font-weight:600}
</style></head><body>
<div class="phone"><div class="inner">
<div class="notch"></div>
<div class="p">
<div class="section">같은 앱, 다른 관계</div>

<div class="card-day1">
<div class="day-label">Day 1 · 초록이</div>
<div class="day-row">
<div>
<div class="day-stage">🌱 새로운 만남</div>
<div class="day-meta">기록 0개 · 진단 0회</div>
</div>
<div class="day-badge">방금 등록</div>
</div>
<div class="chat-sm">
<div class="avatar" style="width:24px;height:24px;font-size:12px">🌱</div>
<div class="bubble-sm"><div class="bname-sm">분즈</div>초록이? 잘 부탁해</div>
</div>
</div>

<div class="arrow-down">↓ ↓ ↓</div>
<div class="arrow-label">30일의 돌봄</div>

<div class="card-day30">
<div class="day-label-green">Day 30 · 마리</div>
<div class="day-row">
<div>
<div class="day-stage">🌿 알아가는 중</div>
<div class="day-meta">기록 30개 · 진단 5회</div>
<div class="day-meta-green">🔥 7일 연속 · 병변 15% → 2%</div>
</div>
<div class="day-emoji">🌿</div>
</div>
<div class="chat-sm">
<div class="avatar" style="width:24px;height:24px;font-size:12px">😊</div>
<div class="bubble-sm"><div class="bname-sm">분즈</div>솔직히 너 꽤 잘 키우는 듯. 마리도 그렇게 생각해</div>
</div>
</div>

<div class="closing">
<div class="closing-main">분즈는 진단 AI가 아닙니다</div>
<div class="closing-sub">나와 식물 사이에서<br>관계를 통역해주는 친구입니다</div>
</div>
</div>
<div class="bnav"><div class="na">🏠 홈</div><div class="ni">📷 진단</div><div class="ni">🎙️ 상담</div><div class="ni">📊 이력</div></div>
</div></div>
</body></html>
