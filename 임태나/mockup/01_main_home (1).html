<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Noto Sans KR',system-ui,sans-serif}
.phone{width:360px;background:#2C2C2A;border-radius:40px;padding:12px;box-shadow:0 12px 48px rgba(0,0,0,0.4)}
.inner{background:#F7F5F0;border-radius:30px;overflow:hidden;min-height:680px;position:relative;padding-bottom:60px}
.notch{width:110px;height:8px;background:#2C2C2A;border-radius:4px;margin:10px auto 16px}
.p{padding:18px 22px}
.ctx{font-size:14px;color:#888780;margin:0 0 2px}
.hl{font-size:28px;font-weight:700;color:#2C2C2A;line-height:1.35;margin:0 0 14px}
.avatar{width:38px;height:38px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.bubble{background:#fff;border:0.5px solid #E5E0D5;border-radius:14px 14px 14px 4px;padding:11px 15px;font-size:13.5px;color:#2C2C2A;flex:1;margin-left:10px;line-height:1.6}
.bname{font-size:10px;color:#3B6D11;font-weight:600;margin-bottom:3px}
.chat{display:flex;align-items:flex-start;margin:12px 0}
.growth{background:linear-gradient(135deg,#EAF3DE 0%,#FFF9E6 100%);border-radius:22px;padding:22px;margin:14px 0;text-align:center}
.gemoji{font-size:40px;margin:6px 0}
.gstage{font-size:19px;font-weight:700;color:#3B6D11}
.gsub{font-size:12px;color:#888780;margin:3px 0}
.meter{display:flex;gap:4px;justify-content:center;margin:10px 0}
.mdot{width:18px;height:5px;border-radius:3px}
.mfill{background:#3B6D11}
.mempty{background:#E5E0D5}
.gdesc{font-size:12px;color:#2C2C2A;font-style:italic;margin-top:8px;line-height:1.5}
.streak{display:inline-block;background:#3B6D11;color:#fff;border-radius:20px;padding:5px 14px;font-size:11px;margin:8px 0}
.stats{display:flex;gap:10px;margin:12px 0}
.stat{flex:1;background:#fff;border-radius:16px;padding:14px 8px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.04)}
.stat-num{font-size:24px;font-weight:700;color:#2C2C2A}
.stat-label{font-size:10px;color:#888780;margin-top:2px}
.milestone{background:#FFF9E6;border-radius:14px;padding:12px 18px;margin:10px 0;text-align:center;font-size:13px;color:#2C2C2A}
.bnav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #E5E0D5;display:flex;justify-content:space-around;padding:12px 0 10px;font-size:10px}
.ni{text-align:center;color:#B4B2A9}
.na{text-align:center;color:#3B6D11;font-weight:600}
</style></head><body>
<div class="phone"><div class="inner">
<div class="notch"></div>
<div class="p">
<div class="ctx">오늘 하루 수고했어.</div>
<div class="hl">마리와 함께한 지<br>벌써 30일째야.</div>
<div class="chat"><div class="avatar">🌱</div><div class="bubble"><div class="bname">분즈</div>오늘도 마리 챙겨주네. 이런 시간이 너한테도 좋은 거야</div></div>
<div class="growth">
<div class="gemoji">🌿</div>
<div class="gstage">알아가는 중</div>
<div class="gsub">마리 · Monstera · 30일째</div>
<div class="meter"><div class="mdot mfill"></div><div class="mdot mfill"></div><div class="mdot mempty"></div><div class="mdot mempty"></div></div>
<div class="gdesc">"서로 알아가는 중이야. 조금만 더 함께하면<br>사이가 깊어질 거야"</div>
</div>
<span class="streak">🔥 7일 연속 돌봄</span><span style="font-size:11px;color:#888780;margin-left:8px">기록 30개</span>
<div class="stats">
<div class="stat"><div class="stat-num">30</div><div class="stat-label">함께한 날</div></div>
<div class="stat"><div class="stat-num">7</div><div class="stat-label">연속 돌봄</div></div>
<div class="stat"><div class="stat-num" style="color:#3B6D11">-13%</div><div class="stat-label">병변 변화</div></div>
</div>
<div class="milestone">🎉 벌써 30번째 기록! 마리가 너한테 고마워하고 있을걸</div>
</div>
<div class="bnav"><div class="na">🏠 홈</div><div class="ni">📷 진단</div><div class="ni">🎙️ 상담</div><div class="ni">📊 이력</div></div>
</div></div>
</body></html>
