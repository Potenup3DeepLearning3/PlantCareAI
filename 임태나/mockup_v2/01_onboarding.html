<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Noto Sans KR',system-ui,sans-serif}
.ph{width:360px;background:#2C2C2A;border-radius:40px;padding:12px;box-shadow:0 12px 48px rgba(0,0,0,0.4)}
.in{background:#F7F5F0;border-radius:30px;overflow:hidden;min-height:680px;position:relative;padding-bottom:56px}
.notch{width:110px;height:8px;background:#2C2C2A;border-radius:4px;margin:10px auto 16px}
.p{padding:20px 24px}
.ctx{font-size:14px;color:#888780;margin:0 0 4px}
.hl{font-size:28px;font-weight:700;color:#2C2C2A;line-height:1.35;margin:0 0 24px}
.av{width:40px;height:40px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.bb{background:#fff;border:0.5px solid #E5E0D5;border-radius:14px 14px 14px 4px;padding:12px 16px;font-size:14px;color:#2C2C2A;flex:1;margin-left:10px;line-height:1.6}
.bn{font-size:10px;color:#3B6D11;font-weight:600;margin-bottom:3px}
.ch{display:flex;align-items:flex-start;margin:14px 0}
.inp{background:#fff;border:1.5px solid #E5E0D5;border-radius:14px;padding:14px 18px;font-size:14px;color:#B4B2A9;width:100%;margin:16px 0}
.inp:focus{border-color:#3B6D11;outline:none}
.nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #E5E0D5;display:flex;justify-content:space-around;padding:12px 0 10px;font-size:10px}
.ni{text-align:center;color:#B4B2A9}
</style></head><body>
<div class="ph"><div class="in">
<div class="notch"></div>
<div class="p">
<div style="height:60px"></div>
<div class="ctx">이름을 부르면, 관계가 시작돼.</div>
<div class="hl">식물 별명을<br>하나 지어줘.</div>
<div class="ch"><div class="av">🌱</div><div class="bb"><div class="bn">분즈</div>별명 하나만 알려줘. 내가 기억할게</div></div>
<div style="height:20px"></div>
<div class="inp">예: 초록이, 마리</div>
</div>
<div class="nav"><div class="ni">🏠 홈</div><div class="ni">📷 진단</div><div class="ni">📊 이력</div></div>
</div></div>
</body></html>
