<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Noto Sans KR',system-ui,sans-serif}
.ph{width:360px;background:#2C2C2A;border-radius:40px;padding:12px;box-shadow:0 12px 48px rgba(0,0,0,0.4)}
.in{background:#F7F5F0;border-radius:30px;overflow:hidden;min-height:750px;position:relative;padding-bottom:56px}
.notch{width:110px;height:8px;background:#2C2C2A;border-radius:4px;margin:10px auto 16px}
.p{padding:18px 22px}
.ctx{font-size:14px;color:#888780;margin:0 0 2px}
.hl{font-size:26px;font-weight:700;color:#2C2C2A;line-height:1.35;margin:0 0 12px}
.av{width:38px;height:38px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.bb{background:#fff;border:0.5px solid #E5E0D5;border-radius:14px 14px 14px 4px;padding:11px 15px;font-size:13.5px;color:#2C2C2A;flex:1;margin-left:10px;line-height:1.6}
.bn{font-size:10px;color:#3B6D11;font-weight:600;margin-bottom:3px}
.ch{display:flex;align-items:flex-start;margin:10px 0}
.gc{background:linear-gradient(135deg,#EAF3DE,#FFF9E6);border-radius:20px;padding:20px;margin:12px 0;text-align:center}
.ge{font-size:36px;margin:4px 0}.gs{font-size:18px;font-weight:700;color:#3B6D11}
.gd{font-size:12px;color:#888780;margin:3px 0}
.meter{display:flex;gap:4px;justify-content:center;margin:8px 0}
.md{width:18px;height:5px;border-radius:3px;background:#E5E0D5}
.gm{font-size:12px;color:#2C2C2A;font-style:italic;margin-top:6px}
.hint{background:#FFF9E6;border-radius:12px;padding:10px 14px;margin:8px 0;font-size:12px;color:#888780;line-height:1.5}
.hint b{color:#3B6D11;font-weight:600}
.divider{border:none;border-top:0.5px solid #E5E0D5;margin:14px 0}
.sec{font-size:14px;font-weight:600;color:#2C2C2A;margin:4px 0 10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.btn{border-radius:16px;background:white;border:1px solid #E5E0D5;padding:10px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
.btn .em{font-size:26px}.btn .lb{font-size:9px;color:#888780;margin-top:4px}
.inp{background:#fff;border:1.5px solid #E5E0D5;border-radius:12px;padding:12px 16px;font-size:13px;color:#B4B2A9;width:100%;margin:8px 0}
.nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #E5E0D5;display:flex;justify-content:space-around;padding:12px 0 10px;font-size:10px}
.ni{text-align:center;color:#B4B2A9}.na{text-align:center;color:#3B6D11;font-weight:600}
</style></head><body>
<div class="ph"><div class="in">
<div class="notch"></div>
<div class="p">
<div class="ctx">좋은 아침.</div>
<div class="hl">초록이 오늘도<br>잘 있을까?</div>
<div class="ch"><div class="av">🌱</div><div class="bb"><div class="bn">분즈</div>초록이? 좋은 이름이야. 앞으로 내가 사이에서 통역해줄게</div></div>
<div class="gc">
<div class="ge">🌱</div><div class="gs">새로운 만남</div>
<div class="gd">초록이 · 0일째</div>
<div class="meter"><div class="md"></div><div class="md"></div><div class="md"></div><div class="md"></div></div>
<div class="gm">"서로 알아가는 중이야. 자주 들러줘"</div>
</div>
<div class="hint"><b>💡 첫 날이니까</b> 오늘은 😊 그냥봄 해줘. 그것만으로도 시작이야.<br>내일 다시 오면 연속 돌봄 시작이야. 기대된다 🌱</div>
<hr class="divider">
<div class="sec">오늘 초록이한테 뭐 해줬어?</div>
<div class="grid">
<div class="btn"><span class="em">💧</span><span class="lb">물줬음</span></div>
<div class="btn"><span class="em">☀️</span><span class="lb">자리옮김</span></div>
<div class="btn"><span class="em">✂️</span><span class="lb">가지치기</span></div>
<div class="btn"><span class="em">💊</span><span class="lb">약줬음</span></div>
<div class="btn"><span class="em">🪴</span><span class="lb">분갈이</span></div>
<div class="btn"><span class="em">🍃</span><span class="lb">잎닦음</span></div>
<div class="btn"><span class="em">😊</span><span class="lb">그냥봄</span></div>
</div>
<hr class="divider">
<div class="sec">초록이한테 궁금한 거 있어?</div>
<div class="ch"><div class="av">🌱</div><div class="bb"><div class="bn">분즈</div>궁금한 거 있으면 밑에 적어봐. 초록이한테 물어볼게</div></div>
<div class="inp">예: 분갈이 어떻게 해?</div>
</div>
<div class="nav"><div class="na">🏠 홈</div><div class="ni">📷 진단</div><div class="ni">📊 이력</div></div>
</div></div>
</body></html>
