<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Noto Sans KR',system-ui,sans-serif}
.ph{width:360px;background:#2C2C2A;border-radius:40px;padding:12px;box-shadow:0 12px 48px rgba(0,0,0,0.4)}
.in{background:#F7F5F0;border-radius:30px;overflow:hidden;min-height:680px;position:relative;padding-bottom:56px}
.notch{width:110px;height:8px;background:#2C2C2A;border-radius:4px;margin:10px auto 16px}
.p{padding:18px 22px}
.sec{font-size:16px;font-weight:600;color:#2C2C2A;margin:4px 0 12px}
.av{width:38px;height:38px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.bb{background:#fff;border:0.5px solid #E5E0D5;border-radius:14px 14px 14px 4px;padding:11px 15px;font-size:13.5px;color:#2C2C2A;flex:1;margin-left:10px;line-height:1.6}
.bn{font-size:10px;color:#3B6D11;font-weight:600;margin-bottom:3px}
.ch{display:flex;align-items:flex-start;margin:10px 0}
.ub{background:#EAF3DE;border-radius:12px 12px 4px 12px;padding:8px 12px;margin:6px 0 6px 60px;text-align:right;font-size:13px;color:#2C2C2A}
.ctx-card{background:#FFF9E6;border-radius:12px;padding:10px 14px;margin:8px 0;font-size:11px;color:#888780}
.ctx-badge{display:inline-block;background:#EAF3DE;color:#3B6D11;border-radius:8px;padding:2px 8px;font-size:10px;margin-bottom:4px}
.inp{background:#fff;border:1.5px solid #E5E0D5;border-radius:12px;padding:12px 16px;font-size:13px;color:#B4B2A9;width:100%;margin:8px 0}
.nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #E5E0D5;display:flex;justify-content:space-around;padding:12px 0 10px;font-size:10px}
.ni{text-align:center;color:#B4B2A9}.na{text-align:center;color:#3B6D11;font-weight:600}
</style></head><body>
<div class="ph"><div class="in">
<div class="notch"></div>
<div class="p">
<div class="sec">진단 관련 질문</div>
<div class="ctx-card">
<div class="ctx-badge">현재 진단</div><br>
마리 · 후기 마름병 · 병변 9.1%
</div>
<div class="ub">이 병이 다른 잎으로 번져?</div>
<div class="ch"><div class="av">😊</div><div class="bb"><div class="bn">분즈</div>마리한테 물어봤어. 후기 마름병은 습하면 번질 수 있대. 감염된 잎은 빨리 잘라주고, 통풍 잘 시켜줘.</div></div>
<div class="ub">잘라낸 잎은 어떻게 해?</div>
<div class="ch"><div class="av">😊</div><div class="bb"><div class="bn">분즈</div>마리가 그러는데, 잘라낸 잎은 바로 버려. 화분 위에 두지 마. 가위도 알코올로 소독해줘.</div></div>
<div class="ub">며칠이면 나아?</div>
<div class="ch"><div class="av">😊</div><div class="bb"><div class="bn">분즈</div>마리한테 물어봤는데, 초기니까 2~3주면 나아질 거래. 그동안 꾸준히 봐줘.</div></div>
<div style="height:8px"></div>
<div class="inp">예: 이 병이 다른 잎으로 번져?</div>
</div>
<div class="nav"><div class="ni">🏠 홈</div><div class="na">📷 진단</div><div class="ni">📊 이력</div></div>
</div></div>
</body></html>
