<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Noto Sans KR',system-ui,sans-serif}
.ph{width:360px;background:#2C2C2A;border-radius:40px;padding:12px;box-shadow:0 12px 48px rgba(0,0,0,0.4)}
.in{background:#F7F5F0;border-radius:30px;overflow:hidden;min-height:700px;position:relative;padding-bottom:56px}
.notch{width:110px;height:8px;background:#2C2C2A;border-radius:4px;margin:10px auto 16px}
.p{padding:18px 22px}
.sec{font-size:18px;font-weight:700;color:#2C2C2A;margin:8px 0 14px;text-align:center}
.av{width:26px;height:26px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.bb-s{background:#fff;border:0.5px solid #E5E0D5;border-radius:10px 10px 10px 4px;padding:7px 10px;font-size:11px;color:#2C2C2A;flex:1;margin-left:6px;line-height:1.5}
.bn-s{font-size:8px;color:#3B6D11;font-weight:600;margin-bottom:2px}
.ch-s{display:flex;align-items:flex-start;margin:8px 0 0}
.c1{background:#fff;border:1px solid #E5E0D5;border-radius:20px;padding:18px;margin:10px 0}
.c30{background:#FFF9E6;border:1.5px solid #C0DD97;border-radius:20px;padding:18px;margin:10px 0}
.dl{font-size:11px;color:#888780;margin-bottom:6px}
.dl-g{font-size:11px;color:#3B6D11;margin-bottom:6px}
.dr{display:flex;justify-content:space-between;align-items:center}
.ds{font-size:16px;font-weight:700;color:#2C2C2A}
.dm{font-size:10px;color:#888780;margin-top:2px}
.dm-g{font-size:10px;color:#3B6D11;margin-top:2px}
.de{font-size:26px}
.db{font-size:10px;color:#B4B2A9}
.arrow{text-align:center;font-size:16px;color:#E5E0D5;margin:8px 0;letter-spacing:2px}
.al{text-align:center;font-size:13px;color:#3B6D11;font-weight:500;margin:2px 0 8px}
.closing{background:linear-gradient(135deg,#EAF3DE,#FFF9E6);border-radius:16px;padding:18px 20px;margin:16px 0;text-align:center}
.cm{font-size:15px;font-weight:700;color:#3B6D11;line-height:1.5}
.cs{font-size:12px;color:#888780;margin-top:8px;line-height:1.6}
.nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #E5E0D5;display:flex;justify-content:space-around;padding:12px 0 10px;font-size:10px}
.ni{text-align:center;color:#B4B2A9}.na{text-align:center;color:#3B6D11;font-weight:600}
</style></head><body>
<div class="ph"><div class="in">
<div class="notch"></div>
<div class="p">
<div class="sec">같은 앱, 다른 관계</div>
<div class="c1">
<div class="dl">Day 1 · 초록이</div>
<div class="dr"><div><div class="ds">🌱 새로운 만남</div><div class="dm">기록 0개 · 진단 0회</div></div><div class="db">방금 등록</div></div>
<div class="ch-s"><div class="av">🌱</div><div class="bb-s"><div class="bn-s">분즈</div>초록이? 잘 부탁해</div></div>
</div>
<div class="arrow">↓ ↓ ↓</div>
<div class="al">30일의 돌봄</div>
<div class="c30">
<div class="dl-g">Day 30 · 마리</div>
<div class="dr"><div><div class="ds">🌿 알아가는 중</div><div class="dm">기록 30개 · 진단 5회</div><div class="dm-g">🔥 7일 연속 · 병변 15% → 2%</div></div><div class="de">🌿</div></div>
<div class="ch-s"><div class="av">😊</div><div class="bb-s"><div class="bn-s">분즈</div>솔직히 너 꽤 잘 키우는 듯. 마리도 그렇게 생각해</div></div>
</div>
<div class="closing">
<div class="cm">분즈는 진단 AI가 아닙니다</div>
<div class="cs">나와 식물 사이에서<br>관계를 통역해주는 친구입니다<br><br>식물을 돌보는 시간이<br>나를 돌보는 시간이 됩니다</div>
</div>
</div>
<div class="nav"><div class="na">🏠 홈</div><div class="ni">📷 진단</div><div class="ni">📊 이력</div></div>
</div></div>
</body></html>
